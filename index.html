<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小英雄成長大冒險 🚀</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a001a 0%, #1a0033 50%, #0d0020 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* 星空背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 60% 70%, white, transparent),
        radial-gradient(1px 1px at 50% 50%, white, transparent),
        radial-gradient(1px 1px at 80% 10%, white, transparent),
        radial-gradient(2px 2px at 90% 60%, white, transparent);
      background-size: 200% 200%;
      animation: stars 20s linear infinite;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes stars {
      from { background-position: 0 0; }
      to { background-position: 100% 100%; }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(100, 116, 139, 0.3);
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(90deg, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
    }

    .name-input {
      background: transparent;
      border: none;
      border-bottom: 1px dashed #475569;
      color: #94a3b8;
      font-size: 14px;
      padding: 5px;
      width: 120px;
      outline: none;
    }

    .points-display {
      font-size: 40px;
      font-family: 'Courier New', monospace;
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
      transition: all 0.3s ease;
    }

    .points-display.pulse {
      transform: scale(1.2);
      text-shadow: 0 0 40px rgba(251, 191, 36, 1);
    }

    /* Main Layout */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Missions Section */
    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #22d3ee;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .missions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .mission-btn {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 15px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .mission-btn:hover {
      transform: scale(1.05);
      border-color: #22d3ee;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
    }

    .mission-btn:active {
      transform: scale(0.95);
    }

    .mission-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(100%);
    }

    .mission-icon {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .mission-name {
      color: #e2e8f0;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .mission-points {
      color: #94a3b8;
      font-size: 12px;
      color: #64748b;
    }

    /* Progress Section */
    .progress-box {
      background: rgba(15, 23, 42, 0.8);
      padding: 25px;
      border-radius: 20px;
      border: 1px solid #334155;
      margin-bottom: 20px;
    }

    .progress-title {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .progress-dot {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid #334155;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #475569;
      transition: all 0.5s ease;
    }

    .progress-dot.active {
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      border-color: #22d3ee;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.7);
      color: white;
    }

    .progress-dot.glow {
      animation: pulseGlow 1.5s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { 
        opacity: 1; 
        box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
      }
      50% { 
        opacity: 0.7; 
        box-shadow: 0 0 25px rgba(34, 211, 238, 1);
      }
    }

    /* Rewards */
    .reward-item {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid #334155;
      border-radius: 15px;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
      transition: all 0.5s ease;
    }

    .reward-item.unlocked {
      background: rgba(99, 102, 241, 0.2);
      border-color: #6366f1;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }

    .reward-icon {
      width: 40px;
      height: 40px;
      background: #334155;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.5s ease;
    }

    .reward-item.unlocked .reward-icon {
      background: #eab308;
      color: #1e293b;
    }

    .reward-content {
      flex: 1;
    }

    .reward-threshold {
      font-size: 12px;
      font-weight: bold;
      color: #fef3c7;
      margin-bottom: 5px;
    }

    .reward-input {
      width: 100%;
      background: transparent;
      border: none;
      color: #cbd5e1;
      font-size: 14px;
      outline: none;
    }

    .reward-input::placeholder {
      color: #334155;
    }

    /* Footer Controls */
    .footer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .footer-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Shields */
    .shields-box {
      background: rgba(127, 29, 29, 0.2);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 20px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .shields-box.flash {
      animation: shieldFlash 0.6s;
      background: rgba(220, 38, 38, 0.5);
      border-color: #dc2626;
    }

    @keyframes shieldFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .shields-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .shields-title {
      font-size: 14px;
      font-weight: bold;
      color: #f87171;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shields-hint {
      font-size: 11px;
      color: #64748b;
    }

    .shields-row {
      display: flex;
      gap: 10px;
    }

    .shield-item {
      flex: 1;
      height: 35px;
      border-radius: 10px;
      border: 2px solid #334155;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .shield-item.active {
      background: #ef4444;
      border-color: #f87171;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
    }

    .shield-item.active:hover {
      background: #dc2626;
    }

    /* Black Hole */
    .blackhole-box {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.5s ease;
    }

    .blackhole-box.active {
      background: #000;
      border-color: #7c3aed;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.8);
    }

    .blackhole-visual {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .blackhole-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.5s ease;
    }

    .blackhole-box.active .blackhole-circle {
      background: #6b21a8;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .blackhole-inner {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #000;
      box-shadow: inset 0 0 10px rgba(124, 58, 237, 0.8);
    }

    .blackhole-label {
      font-weight: bold;
      color: #94a3b8;
    }

    .blackhole-box.active .blackhole-label {
      color: #c084fc;
    }

    .blackhole-desc {
      font-size: 10px;
      color: #475569;
      font-style: italic;
    }

    .blackhole-btn {
      padding: 10px 20px;
      border-radius: 50px;
      border: none;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #334155;
      color: #94a3b8;
    }

    .blackhole-btn:hover {
      background: #475569;
    }

    .blackhole-box.active .blackhole-btn {
      background: #7c3aed;
      color: white;
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.6);
    }

    /* Black Hole Overlay */
    .blackhole-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      animation: distort 5s ease-in-out infinite;
    }

    .blackhole-overlay.active {
      opacity: 1;
    }

    @keyframes distort {
      0%, 100% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.01) rotate(0.2deg); }
      75% { transform: scale(0.99) rotate(-0.2deg); }
    }

    /* Reset Button */
    .reset-btn {
      text-align: center;
      margin-top: 20px;
    }

    .reset-btn button {
      background: none;
      border: none;
      color: #334155;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .reset-btn button:hover {
      color: #dc2626;
    }

    /* Offline Badge */
    .offline-badge {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      color: #86efac;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: bold;
      z-index: 1000;
    }
  
    /* Undo Button */
    .undo-btn {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.9);
      border: 2px solid #22c55e;
      color: white;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
      transition: all 0.3s ease;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .undo-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 30px rgba(34, 197, 94, 0.6);
    }

    .undo-btn:active {
      transform: scale(0.95);
    }

    .undo-btn.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      background: #334155;
      border-color: #475569;
    }
  </style>
</head>
<body>
  <div class="blackhole-overlay" id="blackhole-overlay"></div>
  <div class="offline-badge">🔒 完全離線版本</div>
  <button class="undo-btn disabled" id="undoBtn" onclick="undo()" title="撤銷上一步">↶</button>


  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <div class="title">小英雄成長大冒險</div>
        <input type="text" class="name-input" id="userName" value="小英雄" placeholder="輸入名字">
      </div>
      <div class="points-display" id="pointsDisplay">0 <span style="font-size: 14px;">PTS</span></div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
      <!-- Missions -->
      <section>
        <div class="section-title">🚀 冒險任務卡</div>
        <div class="missions-grid" id="missionsGrid"></div>
      </section>

      <!-- Progress & Rewards -->
      <section>
        <div class="progress-box">
          <div class="progress-title">能量核心進度 (1-21)</div>
          <div class="progress-grid" id="progressGrid"></div>
        </div>

        <div id="rewardsContainer"></div>
      </section>
    </div>

    <!-- Footer -->
    <div class="footer-grid">
      <!-- Shields -->
      <div class="shields-box" id="shieldsBox">
        <div class="shields-header">
          <span class="shields-title">🛡️ 守護盾能</span>
          <span class="shields-hint">一般違規扣除一個</span>
        </div>
        <div class="shields-row" id="shieldsRow"></div>
      </div>

      <!-- Black Hole -->
      <div class="blackhole-box" id="blackholeBox">
        <div class="blackhole-visual">
          <div class="blackhole-circle">
            <div class="blackhole-inner"></div>
          </div>
          <div>
            <div class="blackhole-label">黑洞封印模式</div>
            <div class="blackhole-desc">嚴重違規時啟動 / 無法集點</div>
          </div>
        </div>
        <button class="blackhole-btn" id="blackholeBtn">啟動封印</button>
      </div>
    </div>

    <!-- Reset -->
    <div class="reset-btn">
      <button id="resetBtn">Reset Space Adventure Data</button>
    </div>
  </div>

  <script>
    // === 完全離線版本 - 使用瀏覽器內建音效 ===
    
    // 使用 Web Audio API 生成簡單音效
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBeep(frequency, duration, type = 'success') {
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = frequency;
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + duration);
    }
    
    function playSound(type) {
      switch(type) {
        case 'success':
          playBeep(800, 0.1); // 清脆短音
          break;
        case 'levelUp':
          playBeep(600, 0.1);
          setTimeout(() => playBeep(800, 0.1), 100);
          setTimeout(() => playBeep(1000, 0.2), 200);
          break;
        case 'shieldLoss':
          playBeep(200, 0.3); // 低沈警告
          break;
        case 'blackHole':
          playBeep(400, 0.2);
          setTimeout(() => playBeep(300, 0.2), 150);
          break;
      }
    }

    // State
    let state = {
      points: 0,
      shields: 5,
      isBlackHole: false,
      rewards: { 7: '', 14: '', 21: '' },
      userName: '小英雄'
    };

    // History for undo
    let history = [];

    // Missions Data
    const missions = [
      { id: 1, name: '晨間亮麗任務', desc: '刷牙/洗臉/梳頭', icon: '👤', points: 1, color: '#60a5fa' },
      { id: 2, name: '超能家事力', desc: '協助家事', icon: '🏠', points: 1, color: '#34d399' },
      { id: 3, name: '智慧之光', desc: '考試 100 分', icon: '📚', points: 3, color: '#fbbf24' },
      { id: 4, name: '整潔守護', desc: '環境整潔', icon: '🗑️', points: 1, color: '#22d3ee' },
      { id: 5, name: '夢境準時官', desc: '準時睡覺', icon: '🌙', points: 1, color: '#818cf8' },
      { id: 6, name: '體力強化', desc: '跳繩 500下', icon: '⚡', points: 2, color: '#fb923c' },
    ];

    // Load state from localStorage
    function loadState() {
      const saved = localStorage.getItem('heroDataOffline');
      if (saved) {
        state = JSON.parse(saved);
      }
      render();
      updateUndoButton();
    }

    // Save state to localStorage
    function saveState() {
      localStorage.setItem('heroDataOffline', JSON.stringify(state));
    }

    // Add points
    function addPoints(p) {
      if (state.isBlackHole) return;
      const oldPoints = state.points;
      const newPoints = Math.min(state.points + p, 21);
      
      if (newPoints > oldPoints) {
        // Save to history before changing
        history.push(JSON.parse(JSON.stringify(state)));
        if (history.length > 10) history.shift(); // Keep last 10 only
        
        state.points = newPoints;
        saveState();
        updateUndoButton();
        
        // Visual feedback
        const display = document.getElementById('pointsDisplay');
        display.classList.add('pulse');
        setTimeout(() => display.classList.remove('pulse'), 500);
        
        // Sound
        playSound('success');
        
        // Level up sound
        if ([7, 14, 21].some(t => oldPoints < t && newPoints >= t)) {
          setTimeout(() => playSound('levelUp'), 300);
        }
        
        render();
      }
    }

    // Toggle shield
    function toggleShield(index) {
      const oldShields = state.shields;
      state.shields = index + 1 === state.shields ? index : index + 1;
      
      if (state.shields < oldShields) {
        playSound('shieldLoss');
        const box = document.getElementById('shieldsBox');
        box.classList.add('flash');
        setTimeout(() => box.classList.remove('flash'), 600);
      }
      
      saveState();
      render();
    }

    // Toggle black hole
    function toggleBlackHole() {
      state.isBlackHole = !state.isBlackHole;
      playSound('blackHole');
      saveState();
      render();
    }

    // Update reward
    function updateReward(threshold, value) {
      state.rewards[threshold] = value;
      saveState();
    }

    // Reset all
    function resetAll() {
      if (confirm('確定要重啟冒險嗎？點數將歸零。')) {
        state = {
          points: 0,
          shields: 5,
          isBlackHole: false,
          rewards: { 7: '', 14: '', 21: '' },
          userName: state.userName
        };
        saveState();
        render();
      }
    }


    // Undo function
    function undo() {
      if (history.length === 0) return;
      state = history.pop();
      saveState();
      playBeep(500, 0.15);
      render();
      updateUndoButton();
    }

    // Update undo button state
    function updateUndoButton() {
      const btn = document.getElementById('undoBtn');
      if (history.length > 0) {
        btn.classList.remove('disabled');
      } else {
        btn.classList.add('disabled');
      }
    }

    // Render
    function render() {
      // Points display
      document.getElementById('pointsDisplay').innerHTML = `${state.points} <span style="font-size: 14px;">PTS</span>`;
      
      // User name
      document.getElementById('userName').value = state.userName;
      
      // Missions
      const missionsGrid = document.getElementById('missionsGrid');
      missionsGrid.innerHTML = missions.map(m => `
        <button class="mission-btn ${state.isBlackHole ? 'disabled' : ''}" 
                onclick="addPoints(${m.points})"
                ${state.isBlackHole ? 'disabled' : ''}
                style="border-color: ${state.isBlackHole ? '#334155' : m.color + '44'};">
          <div class="mission-icon">${m.icon}</div>
          <div class="mission-name">${m.name}</div>
          <div class="mission-points">${m.points} 點能量</div>
        </button>
      `).join('');
      
      // Progress
      const progressGrid = document.getElementById('progressGrid');
      progressGrid.innerHTML = Array(21).fill(0).map((_, i) => {
        const isActive = state.points > i;
        const isCurrent = state.points === i + 1 && !state.isBlackHole;
        const isMilestone = (i + 1) % 7 === 0;
        return `
          <div class="progress-dot ${isActive ? 'active' : ''} ${isCurrent ? 'glow' : ''}">
            ${isMilestone && isActive ? '🏆' : (i + 1)}
          </div>
        `;
      }).join('');
      
      // Rewards
      const rewardsContainer = document.getElementById('rewardsContainer');
      rewardsContainer.innerHTML = [7, 14, 21].map(p => `
        <div class="reward-item ${state.points >= p ? 'unlocked' : ''}">
          <div class="reward-icon">🏆</div>
          <div class="reward-content">
            <div class="reward-threshold">${p} 點解鎖獎勵</div>
            <input type="text" 
                   class="reward-input" 
                   placeholder="輸入願望內容..." 
                   value="${state.rewards[p]}"
                   oninput="updateReward(${p}, this.value)">
          </div>
        </div>
      `).join('');
      
      // Shields
      const shieldsRow = document.getElementById('shieldsRow');
      shieldsRow.innerHTML = Array(5).fill(0).map((_, i) => `
        <button class="shield-item ${i < state.shields ? 'active' : ''}" 
                onclick="toggleShield(${i})"></button>
      `).join('');
      
      // Black hole
      const blackholeBox = document.getElementById('blackholeBox');
      const blackholeBtn = document.getElementById('blackholeBtn');
      const blackholeOverlay = document.getElementById('blackhole-overlay');
      
      if (state.isBlackHole) {
        blackholeBox.classList.add('active');
        blackholeBtn.textContent = '修復任務中';
        blackholeOverlay.classList.add('active');
      } else {
        blackholeBox.classList.remove('active');
        blackholeBtn.textContent = '啟動封印';
        blackholeOverlay.classList.remove('active');
      }
    }

    // Event listeners
    document.getElementById('userName').addEventListener('input', (e) => {
      state.userName = e.target.value;
      saveState();
    });

    document.getElementById('blackholeBtn').addEventListener('click', toggleBlackHole);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    // Initialize
    loadState();
  </script>
</body>
</html>
